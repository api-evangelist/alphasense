- aid: alphasense:authentication-api
  name: AlphaSense Authentication API
  description: >-
    OAuth 2.0 password-grant token endpoint at POST /auth. Clients submit email, password, client_id, and
    client_secret together with an x-api-key header to receive a bearer token used on every subsequent Agent or
    Utility API call. The same flow works against SaaS (https://api.alpha-sense.com) and Private Cloud
    (https://{your-domain}/) base URLs.
  humanURL: https://developer.alpha-sense.com/api/getting-started
  baseURL: https://api.alpha-sense.com
  tags:
