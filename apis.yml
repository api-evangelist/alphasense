- aid: alphasense:search-api
  name: AlphaSense Search API
  description: >-
    GraphQL search over the full AlphaSense content library (500M+ documents spanning SEC filings, broker research
    from 1,500+ firms, news, earnings call transcripts, and Tegus expert interviews). Supports keyword and semantic
    filters, date presets, document-type filters, watchlists, and smart synonyms. Operates against the same
    OAuth-protected /gql endpoint as the Agent API. Used to drive in-app search and retrieval flows that do not need
    agentic answer synthesis.
  humanURL: https://developer.alpha-sense.com/api/getting-started
  baseURL: https://api.alpha-sense.com
