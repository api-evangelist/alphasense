aid: alphasense
url: https://raw.githubusercontent.com/api-evangelist/alphasense/refs/heads/main/apis.yml
name: AlphaSense
kind: company
description: >-
  AlphaSense is an AI-powered market intelligence and search platform used by hedge funds, banks, corporates, consulting
  firms, and law firms to accelerate research and decision-making. The platform unifies 500M+ public and private
  documents - SEC filings, broker research from 1,500+ firms, news, earnings call transcripts, internal company content,
  and 260,000+ Tegus expert call transcripts (Tegus was acquired in December 2023 for ~$930M) - behind a generative
  search and agent layer (GenSearch, Deep Research, Workflow Agents). The developer surface is gated, enterprise-only,
  and is split across two contracts: an Agent API for embedding GenSearch / Deep Research / MCP tools into customer AI
  agents, and a set of Utility APIs (Search, Brokers, Companies, Watchlist, Trends, User, Download, Ingestion) for
  direct programmatic access. Both are exposed over a single OAuth 2.0-protected GraphQL endpoint at
  https://api.alpha-sense.com/gql, with a companion REST Ingestion API for Enterprise Intelligence customers. AlphaSense
  Enterprise Intelligence Private Cloud ships with a public Go CLI (AlphaSense-Engineering/privatecloud-cli) for
  installing and validating the Kubernetes-hosted environment in a customer's own VPC.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Market Intelligence
- Financial Research
- Search
- Generative AI
- AI Agents
- Expert Calls
- Document Intelligence
- Enterprise Intelligence
- MCP
- GraphQL
