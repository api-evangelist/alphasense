apis:
- aid: alphasense:agent-api
  name: AlphaSense Agent API
  description: >-
    GraphQL surface for embedding AlphaSense intelligence into customer AI agents. Wraps GenSearch (auto / fast /
    thinkLonger / deepResearch modes), Workflow Agents (pre-built and custom), and the Document Search API behind a
    single OAuth 2.0 + API-key-protected /gql endpoint. Returns markdown-formatted answers with inline citations to
    the underlying AlphaSense source documents (filings, transcripts, broker research, Tegus calls). Designed for
    agentic workflows that need first-result in under five minutes.
  humanURL: https://developer.alpha-sense.com/agent-api/quickstart
  baseURL: https://api.alpha-sense.com
