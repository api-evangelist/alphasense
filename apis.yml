- aid: alphasense:mcp-server
  name: AlphaSense MCP Server
  description: >-
    Model Context Protocol surface that lets MCP-aware AI clients (Claude, Cursor, ChatGPT-style desktop hosts,
    in-house agent frameworks) call GenSearch, ThinkLonger, and Deep Research as tools without writing a bespoke
    GraphQL integration. The MCP server brokers the OAuth flow and enforces the customer's Agent API entitlement.
  humanURL: https://developer.alpha-sense.com/agent-api/quickstart
  baseURL: https://api.alpha-sense.com
  tags:
  - MCP
  - Model Context Protocol
  - Agents
  - Tools
  properties:
  - type: Documentation
    url: https://developer.alpha-sense.com/agent-api/quickstart
- aid: alphasense:privatecloud-cli
  name: AlphaSense Private Cloud CLI
  description: >-
    Go-based CLI (AlphaSense-Engineering/privatecloud-cli, Apache-2.0-ish "Other" license) used by Enterprise
    Intelligence Private Cloud customers to bootstrap and validate the Kubernetes cluster that hosts AlphaSense inside
    their own cloud account. Ships `check` and `install` commands that lay down Crossplane and platform namespaces,
    generate the required ServiceAccounts, Roles, ClusterRoles, and Pods, and reconcile against per-version
    compatibility matrices.
  humanURL: https://github.com/AlphaSense-Engineering/privatecloud-cli
  baseURL: https://github.com/AlphaSense-Engineering/privatecloud-cli
